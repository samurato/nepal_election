name: Fetch Election Data

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  schedule:
    # GitHub schedule is best-effort and may start late; we run a short internal
    # 2-minute polling loop in each scheduled job to keep effective cadence tighter.
    - cron: "*/12 * * * *"
  # Allow a manual run from the Actions tab at any time.
  workflow_dispatch:

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to commit + push updated data files

concurrency:
  group: fetch-election-data
  # Keep runs serialized, but do not cancel in-progress jobs:
  # canceling can break the internal 2-minute polling cadence mid-cycle.
  cancel-in-progress: false

# ── Job ───────────────────────────────────────────────────────────────────────
jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # 1. Check out the repo
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the built-in token so the push is authenticated.
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch minimal history — we only need to commit, not diff the full log.
          fetch-depth: 1

      # 2. Python runtime
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      # 3. Dependencies
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # 4. Fetch election data repeatedly inside this run to approximate ~2 minute cadence
      - name: Fetch election data loop
        id: fetch
        env:
          BATCH_RUNS: "5"
          INTERVAL_SECONDS: "120"
        run: |
          set +e

          # Configure git once before the loop
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          total_runs=0
          changed_runs=0
          unchanged_runs=0
          failed_runs=0
          commits_pushed=0

          BRANCH="${GITHUB_REF_NAME}"
          REMOTE="origin"

          for i in $(seq 1 "$BATCH_RUNS"); do
            echo "Starting fetch run $i/$BATCH_RUNS"
            python scripts/fetch_election_data.py
            CODE=$?
            total_runs=$((total_runs + 1))

            case "$CODE" in
              0) changed_runs=$((changed_runs + 1)) ;;
              1) unchanged_runs=$((unchanged_runs + 1)) ;;
              2) failed_runs=$((failed_runs + 1)) ;;
              *) failed_runs=$((failed_runs + 1)) ;;
            esac

            # Commit and push if data changed
            if [ "$CODE" = "0" ]; then
              if ! git diff --quiet -- data/; then
                echo "Data changed, committing..."
                git add data/
                git commit -m "data: update election results [$(date -u '+%Y-%m-%d %H:%M UTC')]"

                # Push with retry logic
                PUSHED=false
                for attempt in 1 2 3; do
                  if git push "$REMOTE" "HEAD:$BRANCH"; then
                    echo "Push succeeded on attempt $attempt"
                    commits_pushed=$((commits_pushed + 1))
                    PUSHED=true
                    break
                  fi

                  echo "Push failed on attempt $attempt; fetching + rebasing and retrying..."
                  git fetch "$REMOTE" "$BRANCH"
                  if ! git rebase "$REMOTE/$BRANCH"; then
                    git rebase --abort || true
                    echo "Rebase conflict while syncing with $REMOTE/$BRANCH"
                    break
                  fi

                  sleep $((attempt * 2))
                done

                if [ "$PUSHED" = "false" ]; then
                  echo "Warning: Failed to push commit after 3 attempts"
                fi
              else
                echo "Fetch returned success but no file changes detected"
              fi
            fi

            if [ "$i" -lt "$BATCH_RUNS" ]; then
              echo "Sleeping ${INTERVAL_SECONDS}s before next fetch run..."
              sleep "$INTERVAL_SECONDS"
            fi
          done

          set -e

          echo "total_runs=$total_runs" >> "$GITHUB_OUTPUT"
          echo "changed_runs=$changed_runs" >> "$GITHUB_OUTPUT"
          echo "unchanged_runs=$unchanged_runs" >> "$GITHUB_OUTPUT"
          echo "failed_runs=$failed_runs" >> "$GITHUB_OUTPUT"
          echo "commits_pushed=$commits_pushed" >> "$GITHUB_OUTPUT"

          if [ "$failed_runs" -eq "$total_runs" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          elif [ "$changed_runs" -gt 0 ]; then
            echo "status=changed" >> "$GITHUB_OUTPUT"
          elif [ "$unchanged_runs" -eq "$total_runs" ]; then
            echo "status=unchanged" >> "$GITHUB_OUTPUT"
          else
            echo "status=partial" >> "$GITHUB_OUTPUT"
          fi

      # 5. Human-readable summary in the Actions log
      - name: Summary
        if: always()
        run: |
          STATUS="${{ steps.fetch.outputs.status }}"
          TOTAL_RUNS="${{ steps.fetch.outputs.total_runs }}"
          CHANGED_RUNS="${{ steps.fetch.outputs.changed_runs }}"
          UNCHANGED_RUNS="${{ steps.fetch.outputs.unchanged_runs }}"
          FAILED_RUNS="${{ steps.fetch.outputs.failed_runs }}"
          COMMITS_PUSHED="${{ steps.fetch.outputs.commits_pushed }}"

          echo "- total runs: ${TOTAL_RUNS:-n/a}" >> "$GITHUB_STEP_SUMMARY"
          echo "- changed runs: ${CHANGED_RUNS:-n/a}" >> "$GITHUB_STEP_SUMMARY"
          echo "- unchanged runs: ${UNCHANGED_RUNS:-n/a}" >> "$GITHUB_STEP_SUMMARY"
          echo "- failed runs: ${FAILED_RUNS:-n/a}" >> "$GITHUB_STEP_SUMMARY"
          echo "- commits pushed: ${COMMITS_PUSHED:-n/a}" >> "$GITHUB_STEP_SUMMARY"

          case "$STATUS" in
            changed)   echo "### ✅ data.json updated and pushed to GitHub Pages" ;;
            unchanged) echo "### ℹ️ No changes detected — nothing to commit"        ;;
            partial)   echo "### ⚠️ Partial success — some runs had issues"         ;;
            failed)    echo "### ❌ All runs failed — upstream may be down"         ;;
            *)         echo "### ⚠️ Unknown status: $STATUS"                        ;;
          esac >> "$GITHUB_STEP_SUMMARY"
